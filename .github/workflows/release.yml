name: Publish whytab Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify data migration
        run: node scripts/migration-safety-test.mjs

      - name: Build production package
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AUTH_REDIRECT_URL: https://whytab.pages.dev/
        run: npm run build

      - name: Create Chrome and Edge archive
        working-directory: extension/dist
        run: zip -r "../../whytab-${GITHUB_REF_NAME}-chrome-web-store.zip" . -x '*.DS_Store'

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "whytab-${GITHUB_REF_NAME}-chrome-web-store.zip#Chrome and Edge unpacked extension"
          --title "whytab ${GITHUB_REF_NAME}"
          --notes-file "docs/releases/${GITHUB_REF_NAME}.md"
          --verify-tag
